<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  
  <!-- Primary SEO Meta Tags -->
  <meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Geotargeting Location Tags (GEO) -->
  <meta name="geo.region" content="VN" />
  <meta name="geo.placename" content="Hanoi" />
  <meta name="geo.position" content="21.028511;105.804817" />
  <meta name="ICBM" content="21.028511, 105.804817" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{% if page.image %}{% if page.image contains 'http' %}{{ page.image }}{% else %}{{ page.image | absolute_url }}{% endif %}{% else %}{{ '/assets/images/favicon.svg' | absolute_url }}{% endif %}">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta name="twitter:image" content="{% if page.image %}{% if page.image contains 'http' %}{{ page.image }}{% else %}{{ page.image | absolute_url }}{% endif %}{% else %}{{ '/assets/images/favicon.svg' | absolute_url }}{% endif %}">

  {% if page.layout == 'post' %}
  <!-- Article Schema.org Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.description | escape }}",
    "image": [
      "{% if page.image %}{% if page.image contains 'http' %}{{ page.image }}{% else %}{{ page.image | absolute_url }}{% endif %}{% else %}{{ '/assets/images/favicon.svg' | absolute_url }}{% endif %}"
    ],
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "author": [{
      "@type": "Person",
      "name": "{{ page.author | default: 'AgriSynthe AI' }}",
      "url": "{{ '/about/' | absolute_url }}"
    }],
    "publisher": {
      "@type": "Organization",
      "name": "AgriSynthe",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/assets/images/favicon.svg' | absolute_url }}"
      }
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>
  {% else %}
  <!-- Website Schema.org Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "AgriSynthe",
    "url": "{{ '/' | absolute_url }}",
    "description": "{{ site.description | escape }}",
    "publisher": {
      "@type": "Organization",
      "name": "AgriSynthe",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/assets/images/favicon.svg' | absolute_url }}"
      }
    }
  }
  </script>
  {% endif %}
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
</head>
<body>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}
  {% include svg-defs.html %}

  <!-- Custom Script -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
