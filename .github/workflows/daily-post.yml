name: Auto Daily Blog Post

on:
  schedule:
    - cron: '0 1 * * *' # Runs daily at 01:00 AM UTC (08:00 AM Vietnam time)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  write-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Pull Vercel Environment Variables
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel env pull .env --environment=production --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Run generation script
        run: |
          node scripts/generate_daily_post.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _posts/*
          git commit -m "Auto: Add daily blog post from NotebookLM" || echo "No changes to commit"
          git push
