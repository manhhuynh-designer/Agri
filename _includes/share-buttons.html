<div class="share-container">
  <span class="share-title">Chia sẻ hướng dẫn:</span>
  <div class="share-buttons">
    <!-- Facebook Share -->

       target="_blank" rel="noopener noreferrer" class="share-btn share-facebook" title="Chia sẻ lên Facebook">

    <!-- Zalo Share -->

       target="_blank" rel="noopener noreferrer" class="share-btn share-zalo" title="Chia sẻ lên Zalo">
