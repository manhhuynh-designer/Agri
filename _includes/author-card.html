<div class="author-card">
  <!-- Dynamic inline SVG avatar of a seedling growing in soil -->
  <div class="author-avatar-container">
    <svg viewBox="0 0 100 100" class="author-avatar" aria-hidden="true">
      <circle cx="50" cy="50" r="48" fill="var(--bg-2)" stroke="var(--char)" stroke-width="2"/>
      <!-- Soil -->
      <path d="M20 70 Q50 60 80 70 A35 35 0 0 1 20 70" fill="var(--line)"/>
      <!-- Seedling stem -->
      <path d="M50 72 L50 40" stroke="var(--char)" stroke-width="4" stroke-linecap="round" fill="none"/>
      <!-- Leaves -->
      <path d="M50 48 Q35 38 48 35 Q50 42 50 48" fill="var(--char)"/>
      <path d="M50 56 Q65 48 52 42 Q50 50 50 56" fill="var(--char-dim)"/>
      <!-- Sun rays -->
      <circle cx="75" cy="25" r="6" fill="var(--ember)" opacity="0.8"/>
    </svg>
  </div>
  
  <div class="author-info">
    <h4 class="author-name">{% if page.author %}{{ page.author }}{% else %}{{ site.title }}{% endif %}</h4>
    <p class="author-bio">Sáng kiến chia sẻ các thiết kế kỹ thuật tự chế và phương pháp nông nghiệp sinh thái tuần hoàn, phi lợi nhuận hướng tới cộng đồng.</p>
    <a href="mailto:{{ site.email }}" class="author-contact-btn">Gửi thư đóng góp</a>
  </div>
</div>
